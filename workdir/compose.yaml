#make BOLDdistilled lib persist.

# Pinning the project name means the 'reflib' volume (the downloaded reference
# library) is reused across every run, regardless of which directory you run
# this from. Without this, each new dataset folder would get its own empty
# volume and re-download the ~1GB reference library from scratch.
name: map

services:
  map:
    image: ghcr.io/cbg-innov/map:latest
    pull_policy: missing
    working_dir: /MAP
    volumes:
      - reflib:/MAP/REFS
      - ${MAP_DATA:-./data}:/data
    command: ["sleep", "infinity"]
volumes:
  reflib: