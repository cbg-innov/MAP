name: Build and publish MAP image

# Builds a single multi-arch (linux/amd64 + linux/arm64) image and pushes to ghcr.io/cbg-innov/map.

on:
  push:
    branches: [main]
    paths:
      - "Docker/**"
      - ".github/workflows/docker-publish.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to publish (e.g. mac-1.0.3). 'latest' is always published."
        required: false
        default: ""

env:
  IMAGE: ghcr.io/cbg-innov/map

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f
          df -h /

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE }}:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS="$TAGS,${{ env.IMAGE }}:${{ github.ref_name }}"
          fi
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAGS="$TAGS,${{ env.IMAGE }}:${{ github.event.inputs.tag }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
